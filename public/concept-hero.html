<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Concept — Data Constellation (Full-Bleed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #faf9f5;
    --cream-dark: #f0ede5;
    --orange: #d97757;
    --orange-light: #e8a08a;
    --dark: #141413;
    --dark-soft: #2a2a28;
    --muted: #8a8880;
    --line: #e0ddd4;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Nav (simplified) ──────────────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--dark);
    text-decoration: none;
  }
  .nav-logo span { color: var(--orange); }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--muted);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--dark); }
  .nav-links .cta {
    background: var(--dark); color: var(--cream);
    padding: 8px 20px; border-radius: 8px; margin-left: 8px;
  }
  .nav-links .cta:hover { background: var(--dark-soft); color: var(--cream); }

  /* ── Hero ───────────────────────────────── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Full-bleed canvas behind everything */
  .hero canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Gradient shield for text legibility */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(
      105deg,
      var(--cream) 0%,
      var(--cream) 28%,
      rgba(250, 249, 245, 0.92) 35%,
      rgba(250, 249, 245, 0.7) 45%,
      rgba(250, 249, 245, 0.3) 55%,
      rgba(250, 249, 245, 0) 65%
    );
    pointer-events: none;
  }

  .hero-content {
    position: relative; z-index: 2;
    max-width: 1152px;
    margin: 0 auto;
    width: 100%;
    padding: 0 48px;
    pointer-events: none; /* let cursor pass through to canvas */
  }

  .hero-text { max-width: 540px; }

  /* Re-enable pointer events on interactive elements */
  .hero-text a,
  .hero-text button {
    pointer-events: auto;
  }

  .hero-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 24px;
  }

  .hero-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(3.5rem, 8vw, 8rem);
    font-weight: 700; line-height: 0.9;
    color: var(--dark); letter-spacing: -0.02em;
  }

  .hero-underline {
    height: 2px; margin-top: 12px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    transform-origin: left;
    animation: underline-in 0.8s 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes underline-in {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  .hero-tagline {
    margin-top: 32px;
    font-size: 18px; line-height: 1.6; color: var(--muted);
    max-width: 380px;
    animation: fade-up 0.6s 1.4s ease-out both;
  }

  .hero-ctas {
    display: flex; gap: 16px; margin-top: 32px;
    animation: fade-up 0.6s 1.6s ease-out both;
  }
  .hero-ctas a {
    padding: 12px 28px; border-radius: 8px;
    font-size: 14px; font-weight: 500; text-decoration: none;
    transition: all 0.3s;
  }
  .btn-primary {
    background: var(--dark); color: var(--cream);
  }
  .btn-primary:hover { background: var(--dark-soft); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(20,20,19,0.1); }
  .btn-secondary {
    border: 1px solid rgba(20,20,19,0.15); color: var(--dark);
  }
  .btn-secondary:hover { border-color: rgba(20,20,19,0.4); transform: translateY(-2px); }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Scroll indicator ──────────────────── */
  .scroll-hint {
    position: absolute;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 2;
    animation: fade-up 0.6s 2s ease-out both;
  }
  .scroll-hint span {
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }
  .scroll-hint .line {
    width: 1px; height: 32px;
    background: rgba(20,20,19,0.2);
    animation: pulse-line 2s ease-in-out infinite;
    transform-origin: top;
  }
  @keyframes pulse-line {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.4); }
  }

  /* ── Concept label ─────────────────────── */
  .concept-badge {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    background: var(--dark); color: var(--cream);
    padding: 10px 20px; border-radius: 100px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    opacity: 0.7;
  }

  /* ── Tooltip ───────────────────────────── */
  .tooltip {
    position: fixed; z-index: 100;
    background: var(--dark); color: var(--cream);
    padding: 6px 12px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a href="#" class="nav-logo">SW<span>.</span></a>
  <div class="nav-links">
    <a href="#">About</a>
    <a href="#">Work</a>
    <a href="#">Capabilities</a>
    <a href="#" class="cta">Contact</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <canvas id="dataviz"></canvas>

  <div class="hero-content">
    <div class="hero-text">
      <p class="hero-label">Senior Product Designer</p>
      <h1 class="hero-name">Stephen<br>Webb</h1>
      <div class="hero-underline"></div>
      <p class="hero-tagline">
        Product designer at Tyler Technologies.<br>
        I make complex data feel obvious.
      </p>
      <div class="hero-ctas">
        <a href="#" class="btn-primary">View Work ↗</a>
        <a href="#" class="btn-secondary">Get in Touch</a>
      </div>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="line"></div>
  </div>
</section>

<div class="tooltip" id="tooltip"></div>
<div class="concept-badge">CONCEPT — Full-Bleed Data Constellation</div>

<script>
// ─── Data Constellation — Full-Bleed ────────────────────────────
// Canvas spans the entire hero viewport. Nodes biased toward the
// right 60% so text (protected by a CSS gradient shield) stays
// legible on the left. Cursor interaction tracked on the whole
// document so the effect works even over the text area.

const canvas = document.getElementById('dataviz');
const ctx = canvas.getContext('2d');
const hero = document.getElementById('hero');
const tooltip = document.getElementById('tooltip');

// ── Palette ──
const CREAM    = '#faf9f5';
const ORANGE   = '#d97757';
const ORANGE_L = '#e8a08a';
const DARK     = '#141413';
const MUTED    = '#8a8880';
const LINE_CLR = '#e0ddd4';

// ── Config ──
const NODE_COUNT = 180;
const CONNECTION_DIST = 100;
const CURSOR_RADIUS = 240;
const ORGANIZE_STRENGTH = 0.012;   // much slower ramp into organized state
const RETURN_STRENGTH = 0.008;     // gentler drift home

// ── Sizing ──
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = hero.clientWidth;
  H = hero.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Data labels ──
const labels = [
  'Users', 'Reports', 'Dashboards', 'Filters', 'API', 'Charts',
  'Tables', 'Analytics', 'Search', 'Export', 'AI', 'Query',
  'Metrics', 'KPIs', 'Insights', 'Pipeline', 'Schema', 'Alerts',
  'Segments', 'Cohorts', 'Trends', 'Forecast', 'Heatmap', 'Funnel',
];

// ── Node class ──
class Node {
  constructor(i) {
    this.i = i;

    // Bias nodes toward the right 60% of the viewport
    const biasedX = 0.4 + Math.random() * 0.6; // 0.4 – 1.0
    this.x = biasedX * W;
    this.y = Math.random() * H;
    this.homeX = this.x;
    this.homeY = this.y;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;

    // Some stray nodes on the left for a natural feel
    if (Math.random() < 0.12) {
      this.x = Math.random() * 0.4 * W;
      this.homeX = this.x;
      this.opacity = 0.15 + Math.random() * 0.2; // faint
    }

    // Visual properties
    this.isAccent = Math.random() < 0.15;
    this.radius = this.isAccent ? 4 + Math.random() * 3 : 2 + Math.random() * 2;
    this.baseRadius = this.radius;
    this.opacity = this.opacity || (0.3 + Math.random() * 0.5);
    this.label = labels[Math.floor(Math.random() * labels.length)];
    this.showLabel = this.isAccent;

    // Grid target position
    this.gridX = 0;
    this.gridY = 0;
    this.organizing = 0;

    // Pulse phase
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.02;

    // Entrance animation
    this.born = performance.now() + i * 12 + Math.random() * 400;
    this.scale = 0;
  }

  update(time, mx, my, cursorActive) {
    // Entrance
    const age = time - this.born;
    if (age < 0) { this.scale = 0; return; }
    this.scale = Math.min(1, age / 600);

    // Gentle drift
    this.x += this.vx;
    this.y += this.vy;

    // Soft boundary bounce
    const margin = 20;
    if (this.x < margin) this.vx += 0.02;
    if (this.x > W - margin) this.vx -= 0.02;
    if (this.y < margin) this.vy += 0.02;
    if (this.y > H - margin) this.vy -= 0.02;

    // Damping — higher = more drag = smoother motion
    this.vx *= 0.97;
    this.vy *= 0.97;

    // Cursor interaction — organize into bar chart
    if (cursorActive) {
      const dx = this.x - mx;
      const dy = this.y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CURSOR_RADIUS) {
        // Soft falloff — cubic ease for buttery feel
        const t = dist / CURSOR_RADIUS;
        const influence = 1 - t * t;

        const cols = 7;
        const barW = 36;
        const barGap = 10;
        const totalW = cols * barW + (cols - 1) * barGap;
        const startX = mx - totalW / 2;

        const col = this.i % cols;
        const heights = [0.5, 0.75, 0.45, 0.9, 0.6, 0.35, 0.8];
        const barH = heights[col] * 160;
        const row = Math.floor(this.i / cols);
        const rowsInCol = Math.ceil(NODE_COUNT / cols);

        this.gridX = startX + col * (barW + barGap) + barW / 2;
        this.gridY = my + 80 - (row / rowsInCol) * barH;

        // Slow ramp — takes many frames to fully organize
        this.organizing = Math.min(1, this.organizing + ORGANIZE_STRENGTH * influence);

        // Soft spring toward grid — low multiplier for gentle pull
        const pullStrength = this.organizing * 0.02;
        this.vx += (this.gridX - this.x) * pullStrength * 0.04;
        this.vy += (this.gridY - this.y) * pullStrength * 0.04;
      } else {
        this.organizing *= 0.985; // slow fade-out
      }
    } else {
      this.organizing *= 0.985;
    }

    // Gentle return to organic area
    if (this.organizing < 0.1) {
      this.vx += (this.homeX - this.x) * RETURN_STRENGTH * 0.005;
      this.vy += (this.homeY - this.y) * RETURN_STRENGTH * 0.005;
    }

    // Pulse
    this.pulsePhase += this.pulseSpeed;
    this.radius = this.baseRadius + Math.sin(this.pulsePhase) * (this.isAccent ? 1.5 : 0.5);
  }

  draw() {
    if (this.scale === 0) return;

    const s = this.scale;
    const r = this.radius * s;
    const alpha = this.opacity * s;

    // Glow for accent nodes
    if (this.isAccent) {
      ctx.beginPath();
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
      grad.addColorStop(0, `rgba(217, 119, 87, ${0.15 * s})`);
      grad.addColorStop(1, `rgba(217, 119, 87, 0)`);
      ctx.fillStyle = grad;
      ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    if (this.isAccent) {
      ctx.fillStyle = ORANGE;
    } else {
      const organized = this.organizing;
      const gr = Math.round(138 - organized * 80);
      const gg = Math.round(136 - organized * 80);
      const gb = Math.round(128 - organized * 70);
      ctx.fillStyle = `rgba(${gr}, ${gg}, ${gb}, ${alpha})`;
    }
    ctx.fill();
  }
}

// ── State ──
let nodes = [];
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000; // interpolated cursor for fluid motion
let cursorActive = false;
let hoveredNode = null;

function init() {
  resize();
  nodes = [];
  for (let i = 0; i < NODE_COUNT; i++) {
    nodes.push(new Node(i));
  }
}

// ── Mouse tracking on the whole document ──
// (so cursor interaction works even over the text overlay)
document.addEventListener('mousemove', (e) => {
  const rect = hero.getBoundingClientRect();
  // Only activate if cursor is within the hero section
  if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    cursorActive = true;
  } else {
    cursorActive = false;
  }

  // Check for hovered node (for tooltips)
  hoveredNode = null;
  if (cursorActive) {
    for (const node of nodes) {
      const dx = node.x - mouseX;
      const dy = node.y - mouseY;
      if (Math.sqrt(dx * dx + dy * dy) < node.radius + 8) {
        hoveredNode = node;
        break;
      }
    }
  }

  // Tooltip
  if (hoveredNode && hoveredNode.isAccent) {
    tooltip.textContent = hoveredNode.label;
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 28) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

document.addEventListener('mouseleave', () => {
  cursorActive = false;
  hoveredNode = null;
  tooltip.classList.remove('visible');
});

// ── Draw connections ──
function drawConnections(time) {
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].scale < 0.3) continue;
    for (let j = i + 1; j < nodes.length; j++) {
      if (nodes[j].scale < 0.3) continue;
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CONNECTION_DIST) {
        const alpha = (1 - dist / CONNECTION_DIST) * 0.12
          * nodes[i].scale * nodes[j].scale;

        const bothAccent = nodes[i].isAccent && nodes[j].isAccent;
        const anyOrganized = (nodes[i].organizing + nodes[j].organizing) / 2;

        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);

        if (bothAccent) {
          ctx.strokeStyle = `rgba(217, 119, 87, ${alpha * 3})`;
        } else if (anyOrganized > 0.3) {
          ctx.strokeStyle = `rgba(20, 20, 19, ${alpha * (1 + anyOrganized)})`;
        } else {
          ctx.strokeStyle = `rgba(138, 136, 128, ${alpha})`;
        }
        ctx.lineWidth = bothAccent ? 1.2 : 0.6;
        ctx.stroke();
      }
    }
  }
}

// ── Draw axis hints when organizing ──
function drawAxisHints() {
  let avgOrg = 0;
  nodes.forEach(n => avgOrg += n.organizing);
  avgOrg /= nodes.length;

  if (avgOrg < 0.15) return;

  const alpha = Math.min(0.2, avgOrg * 0.4);

  // Use smoothed cursor for axis hints too
  const ax = smoothMX;
  const ay = smoothMY;

  // Horizontal baseline
  ctx.beginPath();
  ctx.moveTo(ax - 160, ay + 85);
  ctx.lineTo(ax + 160, ay + 85);
  ctx.strokeStyle = `rgba(224, 221, 212, ${alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Vertical axis
  ctx.beginPath();
  ctx.moveTo(ax - 160, ay + 85);
  ctx.lineTo(ax - 160, ay - 100);
  ctx.strokeStyle = `rgba(224, 221, 212, ${alpha * 0.6})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tick marks on horizontal axis
  const cols = 7;
  const barW = 36;
  const barGap = 10;
  const totalW = cols * barW + (cols - 1) * barGap;
  const startX = ax - totalW / 2;

  for (let c = 0; c < cols; c++) {
    const tx = startX + c * (barW + barGap) + barW / 2;
    ctx.beginPath();
    ctx.moveTo(tx, ay + 85);
    ctx.lineTo(tx, ay + 90);
    ctx.strokeStyle = `rgba(224, 221, 212, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ── Main loop ──
function animate(time) {
  ctx.clearRect(0, 0, W, H);

  // Smooth cursor interpolation — nodes track a lagged cursor
  // so the grid doesn't jitter as the real cursor moves quickly
  const smoothing = 0.08;
  smoothMX += (mouseX - smoothMX) * smoothing;
  smoothMY += (mouseY - smoothMY) * smoothing;

  nodes.forEach(n => n.update(time, smoothMX, smoothMY, cursorActive));
  drawConnections(time);
  drawAxisHints();
  nodes.forEach(n => n.draw());

  requestAnimationFrame(animate);
}

// ── Init ──
init();
requestAnimationFrame(animate);
window.addEventListener('resize', () => {
  resize();
  // Re-home nodes to new viewport dimensions
  nodes.forEach(n => {
    const biasedX = 0.4 + Math.random() * 0.6;
    n.homeX = biasedX * W;
    n.homeY = Math.random() * H;
  });
});
</script>

</body>
</html>
